<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <title>// ARCHITEKT PRÁZDNOTY — COMIC EDITOR //</title>
  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@300;400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.js"></script>
  <style>
    :root {
      --bg: #02080e;
      --panel-bg: rgba(6, 17, 28, 0.7);
      --border-color: rgba(45, 226, 255, 0.25);
      --cyan: #2de2ff;
      --cyan-glow: rgba(45, 226, 255, 0.4);
      --amber: #ffb52e;
      --amber-glow: rgba(255, 181, 46, 0.4);
      --green: #ccff00;
      --green-glow: rgba(204, 255, 0, 0.4);
      --text: #e0f7fc;
      --text-muted: #7aa5b0;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg);
      background-image: 
        radial-gradient(120% 70% at 50% 10%, rgba(45, 226, 255, 0.07) 0%, transparent 50%),
        linear-gradient(rgba(2, 8, 14, 0.8) 0%, rgba(2, 8, 14, 0.95) 100%);
      color: var(--text);
      font-family: 'Chakra Petch', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* HUD Frame Header */
    header {
      background: rgba(2, 8, 14, 0.9);
      border-bottom: 2px solid var(--cyan);
      box-shadow: 0 0 15px var(--cyan-glow);
      padding: 15px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo-container {
      display: flex;
      flex-direction: column;
    }

    h1 {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--cyan);
      text-shadow: 0 0 8px var(--cyan-glow);
      font-family: 'Share Tech Mono', monospace;
    }

    .subtitle {
      font-size: 10px;
      color: var(--text-muted);
      letter-spacing: 3px;
      margin-top: 2px;
    }

    .filter-bar {
      display: flex;
      gap: 15px;
    }

    .btn-filter {
      background: transparent;
      border: 1px solid var(--border-color);
      color: var(--text-muted);
      padding: 6px 16px;
      cursor: pointer;
      font-size: 12px;
      font-family: 'Share Tech Mono', monospace;
      text-transform: uppercase;
      transition: all 0.3s ease;
      clip-path: polygon(10px 0%, 100% 0%, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0% 100%, 0% 10px);
    }

    .btn-filter:hover, .btn-filter.active {
      color: var(--cyan);
      border-color: var(--cyan);
      background: rgba(45, 226, 255, 0.05);
      box-shadow: 0 0 10px rgba(45, 226, 255, 0.2);
    }

    /* Dashboard Layout */
    .dashboard {
      display: grid;
      grid-template-columns: 320px 1fr;
      height: calc(100vh - 65px);
    }

    /* Panel List Sidebar */
    .sidebar {
      border-right: 1px solid var(--border-color);
      overflow-y: auto;
      background: rgba(1, 4, 8, 0.5);
      padding: 15px;
    }

    .panel-card {
      background: var(--panel-bg);
      border: 1px solid var(--border-color);
      border-radius: 4px;
      padding: 10px;
      margin-bottom: 12px;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      gap: 12px;
      align-items: center;
      position: relative;
      overflow: hidden;
    }

    .panel-card::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 3px;
      background: transparent;
    }

    .panel-card:hover {
      border-color: rgba(45, 226, 255, 0.6);
      transform: translateX(4px);
    }

    .panel-card.active {
      border-color: var(--cyan);
      box-shadow: 0 0 10px rgba(45, 226, 255, 0.15);
      background: rgba(45, 226, 255, 0.05);
    }

    .panel-card.active::before {
      background: var(--cyan);
    }

    .panel-card img {
      width: 70px;
      height: 70px;
      object-fit: cover;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 2px;
    }

    .panel-card-info {
      flex: 1;
      min-width: 0;
    }

    .panel-card-id {
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      color: var(--amber);
      margin-bottom: 4px;
    }

    .panel-card-text {
      font-size: 11px;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Main Workspace */
    .workspace {
      display: grid;
      grid-template-columns: 1fr 1fr;
      padding: 30px;
      gap: 30px;
      overflow-y: auto;
    }

    .workspace-pane {
      background: var(--panel-bg);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      position: relative;
    }

    .pane-title {
      font-family: 'Share Tech Mono', monospace;
      font-size: 14px;
      color: var(--cyan);
      letter-spacing: 2px;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 8px;
      display: flex;
      justify-content: space-between;
    }

    /* Image Display Area */
    .image-container {
      position: relative;
      width: 100%;
      aspect-ratio: 1/1;
      background: #010408;
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 4px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .image-container img, .image-container video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .sentence-box {
      background: rgba(2, 8, 14, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.05);
      padding: 15px;
      border-radius: 4px;
      font-size: 14px;
      line-height: 1.5;
      color: var(--text);
    }

    /* Generation Control Form */
    .control-box {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    label {
      font-size: 11px;
      font-family: 'Share Tech Mono', monospace;
      color: var(--text-muted);
      text-transform: uppercase;
    }

    textarea {
      width: 100%;
      height: 120px;
      background: rgba(2, 8, 14, 0.8);
      border: 1px solid var(--border-color);
      border-radius: 4px;
      color: var(--text);
      font-family: 'Chakra Petch', sans-serif;
      font-size: 13px;
      padding: 12px;
      resize: none;
      outline: none;
      transition: border-color 0.3s;
    }

    textarea:focus {
      border-color: var(--cyan);
      box-shadow: 0 0 8px rgba(45, 226, 255, 0.15);
    }

    input[type="text"] {
      width: 100%;
      background: rgba(2, 8, 14, 0.8);
      border: 1px solid var(--border-color);
      border-radius: 4px;
      color: var(--text);
      font-family: 'Chakra Petch', sans-serif;
      font-size: 13px;
      padding: 12px;
      outline: none;
      transition: border-color 0.3s;
    }

    input[type="text"]:focus {
      border-color: var(--cyan);
      box-shadow: 0 0 8px rgba(45, 226, 255, 0.15);
    }

    /* Controls & Buttons */
    .btn {
      font-family: 'Share Tech Mono', monospace;
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      padding: 12px 24px;
      cursor: pointer;
      border: none;
      border-radius: 4px;
      transition: all 0.3s ease;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-primary {
      background: var(--cyan);
      color: #02080e;
      box-shadow: 0 0 15px var(--cyan-glow);
    }

    .btn-primary:hover:not(:disabled) {
      background: #80eeff;
      box-shadow: 0 0 25px var(--cyan-glow);
    }

    .btn-secondary {
      background: transparent;
      border: 1px solid var(--border-color);
      color: var(--text-muted);
    }

    .btn-secondary:hover:not(:disabled) {
      color: var(--cyan);
      border-color: var(--cyan);
    }

    .btn-success {
      background: var(--green);
      color: #02080e;
      box-shadow: 0 0 15px var(--green-glow);
    }

    .btn-success:hover:not(:disabled) {
      background: #e6ff80;
      box-shadow: 0 0 25px var(--green-glow);
    }

    .btn-danger {
      background: #ff4a4a;
      color: #fff;
    }

    .btn-danger:hover:not(:disabled) {
      background: #ff7373;
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .actions-row {
      display: flex;
      gap: 15px;
      justify-content: flex-end;
    }

    /* Polling Status Indicators */
    .status-overlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(2, 8, 14, 0.85);
      backdrop-filter: blur(4px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 15px;
      z-index: 10;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }

    .status-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 3px solid rgba(45, 226, 255, 0.1);
      border-top-color: var(--cyan);
      border-radius: 50%;
      animation: spin 1s infinite linear;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .status-text {
      font-family: 'Share Tech Mono', monospace;
      font-size: 14px;
      letter-spacing: 1px;
    }

    .status-details {
      font-size: 11px;
      color: var(--text-muted);
    }

    .hidden {
      display: none !important;
    }

    /* Notification Toast */
    .toast {
      position: fixed;
      bottom: 30px;
      right: 30px;
      background: rgba(2, 8, 14, 0.95);
      border: 1px solid var(--cyan);
      box-shadow: 0 0 20px var(--cyan-glow);
      padding: 16px 24px;
      border-radius: 4px;
      z-index: 200;
      transform: translateY(100px);
      opacity: 0;
      transition: all 0.3s ease;
      font-size: 13px;
    }

    .toast.active {
      transform: translateY(0);
      opacity: 1;
    }

    .toast.success {
      border-color: var(--green);
      box-shadow: 0 0 20px var(--green-glow);
    }
  </style>
</head>
<body>

  <header>
    <div class="logo-container">
      <h1>// ARCHITEKT PRÁZDNOTY — COMIC EDITOR //</h1>
      <div class="subtitle">IMAGE REVIEW & REGENERATION DASHBOARD</div>
    </div>
    <div class="filter-bar">
      <button class="btn-filter active" onclick="filterParts('all')">Všechny díly</button>
      <button class="btn-filter" onclick="filterParts('01')">Díl I</button>
      <button class="btn-filter" onclick="filterParts('02')">Díl II</button>
      <button class="btn-filter" onclick="filterParts('03')">Díl III</button>
    </div>
  </header>

  <div class="dashboard">
    <!-- Sidebar List -->
    <div class="sidebar" id="panel-list">
      <!-- Cards rendered dynamically -->
    </div>

    <!-- Main Workspace -->
    <div class="workspace">
      <!-- Left Pane: Original -->
      <div class="workspace-pane" id="original-pane">
        <div class="pane-title">
          <span>ORIGINÁLNÍ OBRÁZEK</span>
          <div style="display: flex; gap: 10px; align-items: center;">
            <span id="orig-filename-label" style="margin-right: 10px;">---</span>
            <button class="btn btn-secondary" id="btn-crop-toggle" onclick="toggleCropMode()" style="padding: 4px 10px; font-size: 11px;" disabled>
              ✂ OŘEZAT
            </button>
          </div>
        </div>
        
        <div class="image-container" id="orig-image-container">
          <img id="orig-image" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='100' height='100' viewBox='0 0 100 100'><rect width='100' height='100' fill='%2306111c'/><text x='50' y='55' font-family='sans-serif' font-size='8' fill='%237aa5b0' text-anchor='middle'>VYBERTE PANEL</text></svg>" alt="Original image preview">
        </div>

        <div id="crop-toolbar" class="hidden" style="display: flex; flex-direction: column; gap: 10px; background: rgba(1, 4, 8, 0.6); padding: 12px; border-radius: 4px; border: 1px solid var(--border-color); margin-top: -10px;">
          <label style="font-family: 'Share Tech Mono', monospace; font-size: 11px; color: var(--text-muted);">POMĚR STRAN OŘEZU</label>
          <div style="display: flex; gap: 8px; flex-wrap: wrap;">
            <button class="btn-filter" id="crop-aspect-16-9" onclick="setCropAspect(16/9)">16:9</button>
            <button class="btn-filter" id="crop-aspect-4-3" onclick="setCropAspect(4/3)">4:3</button>
            <button class="btn-filter active" id="crop-aspect-1-1" onclick="setCropAspect(1)">1:1</button>
            <button class="btn-filter" id="crop-aspect-3-4" onclick="setCropAspect(3/4)">3:4</button>
            <button class="btn-filter" id="crop-aspect-9-16" onclick="setCropAspect(9/16)">9:16</button>
            <button class="btn-filter" id="crop-aspect-free" onclick="setCropAspect(NaN)">Volný</button>
          </div>
          <div style="display: flex; gap: 10px; margin-top: 5px; justify-content: flex-end;">
            <button class="btn btn-secondary" onclick="cancelCrop()" style="padding: 6px 15px; font-size: 11px;">Zrušit</button>
            <button class="btn btn-success" onclick="commitCrop()" style="padding: 6px 15px; font-size: 11px;">Uložit ořez</button>
          </div>
        </div>

        <div class="control-box">
          <label>Věta pro zobrazení panelu</label>
          <div class="sentence-box" id="sentence-text">
            Vyberte panel ze seznamu vlevo pro načtení informací.
          </div>
        </div>

        <div class="control-box">
          <label>Doplňující detail / akce (např. detail na ústa, detail na rover)</label>
          <input type="text" id="custom-detail" placeholder="Udejte detail záběru nebo specifickou akci..." oninput="updateComposedPromptPreview()">
        </div>

        <div class="control-box">
          <label>Prompt pro Kling AI generování (základní styl)</label>
          <textarea id="generation-prompt" placeholder="Vložte detailní prompt pro Kling AI..." oninput="updateComposedPromptPreview()"></textarea>
        </div>

        <div class="control-box">
          <label>Finální prompt k odeslání (sestaveno automaticky)</label>
          <div id="composed-prompt-preview" style="font-family: 'Share Tech Mono', monospace; font-size: 11px; color: var(--text-muted); background: rgba(1, 4, 8, 0.4); border: 1px solid rgba(255, 255, 255, 0.05); padding: 10px; border-radius: 4px; line-height: 1.4; word-break: break-all;">
            ---
          </div>
        </div>

        <button class="btn btn-primary" id="btn-generate" onclick="startGeneration()" disabled>
          ⚡ GENERATE NEW VARIANT
        </button>
      </div>

      <!-- Right Pane: New Generation Preview -->
      <div class="workspace-pane" id="preview-pane">
        <div class="pane-title">
          <span>NOVÝ NÁHLED</span>
          <span id="preview-status-label">[STANDBY]</span>
        </div>

        <div class="image-container" id="generated-container">
          <img id="generated-image" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='100' height='100' viewBox='0 0 100 100'><rect width='100' height='100' fill='%2306111c'/><text x='50' y='55' font-family='sans-serif' font-size='8' fill='%237aa5b0' text-anchor='middle'>ČEKÁ SE NA GENEROVÁNÍ</text></svg>" alt="New generation preview">
          <video id="generated-video" class="hidden" autoplay loop muted></video>
        </div>

        <div class="control-box" style="flex: 1; display: flex; flex-direction: column; justify-content: flex-end;">
          <div class="actions-row">
            <button class="btn btn-secondary" id="btn-discard" onclick="discardGeneration()" disabled>
              Zahodit
            </button>
            <button class="btn btn-success" id="btn-approve" onclick="approveGeneration()" disabled>
              ✓ OK - Nahradit původní
            </button>
          </div>
        </div>

        <!-- Polling Status Overlay -->
        <div class="status-overlay" id="status-overlay">
          <div class="spinner"></div>
          <div class="status-text" id="status-text">Generuji video na Kling AI...</div>
          <div class="status-details" id="status-details">Odesílám task do fronty</div>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast-notification">Uloženo</div>

  <script>
    let panels = [];
    let currentPanel = null;
    let pollInterval = null;
    let cropper = null;
    let isCropMode = false;

    // Load initial panels
    async function loadPanels() {
      try {
        const response = await fetch('/api/panels');
        if (!response.ok) throw new Error('Failed to fetch panels');
        panels = await response.json();
        renderPanelList();
      } catch (err) {
        showToast('Chyba při načítání panelů: ' + err.message, false);
      }
    }

    function renderPanelList(filterPart = 'all') {
      const container = document.getElementById('panel-list');
      container.innerHTML = '';
      
      const filtered = panels.filter(p => {
        if (filterPart === 'all') return true;
        return p.filename.startsWith(filterPart + '_');
      });

      filtered.forEach(p => {
        const activeClass = (currentPanel && currentPanel.filename === p.filename) ? 'active' : '';
        const card = document.createElement('div');
        card.className = `panel-card ${activeClass}`;
        card.onclick = () => selectPanel(p);
        
        card.innerHTML = `
          <img src="${p.imgSrc}" alt="">
          <div class="panel-card-info">
            <div class="panel-card-id">${p.filename}</div>
            <div class="panel-card-text">${p.text || '[Bez textu]'}</div>
          </div>
        `;
        container.appendChild(card);
      });
    }

    function filterParts(part) {
      document.querySelectorAll('.btn-filter').forEach(btn => btn.classList.remove('active'));
      event.target.classList.add('active');
      renderPanelList(part);
    }

    function selectPanel(panel) {
      currentPanel = panel;
      
      // Update sidebar active highlights
      document.querySelectorAll('.panel-card').forEach(card => {
        card.classList.remove('active');
        if (card.querySelector('.panel-card-id').textContent === panel.filename) {
          card.classList.add('active');
        }
      });

      // Update original pane contents
      document.getElementById('orig-filename-label').textContent = panel.filename;
      document.getElementById('orig-image').src = panel.imgSrc;
      document.getElementById('sentence-text').textContent = panel.text || "[Tento panel nemá žádný přidělený text v caption]";
      document.getElementById('custom-detail').value = '';
      document.getElementById('generation-prompt').value = panel.defaultPrompt;
      document.getElementById('btn-generate').disabled = false;
      document.getElementById('btn-crop-toggle').disabled = false;

      // Cancel any active crop to refresh the state for the new panel
      cancelCrop();

      // Update composed prompt preview
      updateComposedPromptPreview();

      // Reset preview pane
      resetPreviewPane();
    }

    function toggleCropMode() {
      if (!currentPanel) return;
      
      const toolbar = document.getElementById('crop-toolbar');
      const btn = document.getElementById('btn-crop-toggle');
      const imageEl = document.getElementById('orig-image');
      
      if (isCropMode) {
        // Deactivate
        cancelCrop();
      } else {
        // Activate
        isCropMode = true;
        btn.classList.add('active');
        btn.textContent = '✕ ZAVŘÍT OŘEZ';
        toolbar.classList.remove('hidden');
        
        // Reset active aspect button to 1:1
        document.querySelectorAll('#crop-toolbar .btn-filter').forEach(b => b.classList.remove('active'));
        document.getElementById('crop-aspect-1-1').classList.add('active');
        
        cropper = new Cropper(imageEl, {
          aspectRatio: 1, // Default 1:1
          viewMode: 1,
          autoCropArea: 1,
          background: false,
          ready() {
            console.log("Cropper initialized successfully.");
          }
        });
      }
    }

    function setCropAspect(ratio) {
      if (!cropper) return;
      
      // Update aspect ratio buttons active class
      document.querySelectorAll('#crop-toolbar .btn-filter').forEach(btn => btn.classList.remove('active'));
      
      // Match the click target and set active
      if (isNaN(ratio)) document.getElementById('crop-aspect-free').classList.add('active');
      else if (ratio === 16/9) document.getElementById('crop-aspect-16-9').classList.add('active');
      else if (ratio === 4/3) document.getElementById('crop-aspect-4-3').classList.add('active');
      else if (ratio === 1) document.getElementById('crop-aspect-1-1').classList.add('active');
      else if (ratio === 3/4) document.getElementById('crop-aspect-3-4').classList.add('active');
      else if (ratio === 9/16) document.getElementById('crop-aspect-9-16').classList.add('active');
      
      cropper.setAspectRatio(ratio);
    }

    function cancelCrop() {
      const toolbar = document.getElementById('crop-toolbar');
      const btn = document.getElementById('btn-crop-toggle');
      
      if (cropper) {
        cropper.destroy();
        cropper = null;
      }
      
      isCropMode = false;
      if (btn) {
        btn.classList.remove('active');
        btn.textContent = '✂ OŘEZAT';
      }
      if (toolbar) {
        toolbar.classList.add('hidden');
      }
      
      // Reset image element to remove cropper styles
      const imageEl = document.getElementById('orig-image');
      if (imageEl && currentPanel) {
        imageEl.src = currentPanel.imgSrc + '?t=' + Date.now();
      }
    }

    async function commitCrop() {
      if (!cropper || !currentPanel) return;
      
      const canvas = cropper.getCroppedCanvas();
      if (!canvas) {
        showToast('Nepodařilo se získat ořezanou oblast.', false);
        return;
      }
      
      const dataUrl = canvas.toDataURL('image/jpeg', 0.95);
      showOverlay(true, 'Ukládám ořezaný obrázek...', 'Zálohuji a přepisuji soubor na disku');
      
      try {
        const response = await fetch('/api/crop', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            filename: currentPanel.filename,
            imageData: dataUrl
          })
        });
        
        const resData = await response.json();
        if (!response.ok) throw new Error(resData.error || 'Server error');
        
        showOverlay(false);
        showToast('Obrázek byl úspěšně oříznut a nahrazen!', true);
        
        // Save current filename to re-select
        const savedFilename = currentPanel.filename;
        
        // Exit crop mode
        cancelCrop();
        
        // Reload panel images
        await loadPanels();
        
        // Find and reselect panel to show updated cropped version
        const updated = panels.find(p => p.filename === savedFilename);
        if (updated) {
          selectPanel(updated);
        }
      } catch (err) {
        showOverlay(false);
        showToast('Chyba při ukládání ořezu: ' + err.message, false);
      }
    }

    function updateComposedPromptPreview() {
      let prompt = document.getElementById('generation-prompt').value.trim();
      const customDetail = document.getElementById('custom-detail').value.trim();
      
      if (customDetail) {
        const stylePhrase = "video in Style of @Image";
        if (prompt.includes(stylePhrase)) {
          prompt = prompt.replace(stylePhrase, `${customDetail}, ${stylePhrase}`);
        } else {
          prompt = `${prompt}, ${customDetail}`;
        }
      }
      
      const previewEl = document.getElementById('composed-prompt-preview');
      if (previewEl) {
        previewEl.textContent = prompt || '---';
      }
      return prompt;
    }

    function resetPreviewPane() {
      const img = document.getElementById('generated-image');
      const video = document.getElementById('generated-video');
      img.classList.remove('hidden');
      img.src = "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='100' height='100' viewBox='0 0 100 100'><rect width='100' height='100' fill='%2306111c'/><text x='50' y='55' font-family='sans-serif' font-size='8' fill='%237aa5b0' text-anchor='middle'>ČEKÁ SE NA GENEROVÁNÍ</text></svg>";
      video.classList.add('hidden');
      video.src = '';
      
      document.getElementById('preview-status-label').textContent = '[STANDBY]';
      document.getElementById('btn-approve').disabled = true;
      document.getElementById('btn-discard').disabled = true;
    }

    async function startGeneration() {
      if (!currentPanel) return;
      
      const prompt = updateComposedPromptPreview();
      if (!prompt) {
        showToast('Prosím zadejte prompt pro generování', false);
        return;
      }

      showOverlay(true, 'Zahajuji generování na Kling AI...', 'Odesílám požadavek');
      
      try {
        const response = await fetch('/api/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            prompt,
            filename: currentPanel.filename
          })
        });

        const resData = await response.json();
        if (!response.ok) throw new Error(resData.error || 'Generování selhalo');

        const taskId = resData.taskId;
        startPolling(taskId);
      } catch (err) {
        showOverlay(false);
        showToast('Chyba: ' + err.message, false);
      }
    }

    function startPolling(taskId) {
      showOverlay(true, 'Generuji video na Kling...', 'Task ID: ' + taskId + ' (čekám ve frontě)');
      let checks = 0;

      pollInterval = setInterval(async () => {
        checks++;
        try {
          const response = await fetch(`/api/generate/status/${taskId}`);
          if (!response.ok) throw new Error('Polling failed');
          const data = await response.json();

          if (data.status === 'succeed') {
            clearInterval(pollInterval);
            showOverlay(true, 'Stahuji video a extrahuji snímek...', 'Stahování a extrakce přes ffmpeg');
            downloadAndExtract(data.videoUrl);
          } else if (data.status === 'failed') {
            clearInterval(pollInterval);
            showOverlay(false);
            showToast('Generování selhalo: ' + data.error, false);
          } else {
            // Still processing
            updateOverlayDetails(`Zpracovávám (běží ${checks * 5}s)...`);
          }
        } catch (err) {
          clearInterval(pollInterval);
          showOverlay(false);
          showToast('Chyba při monitorování stavu: ' + err.message, false);
        }
      }, 5000);
    }

    async function downloadAndExtract(videoUrl) {
      try {
        const response = await fetch('/api/download-frame', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            videoUrl,
            filename: currentPanel.filename
          })
        });

        const data = await response.json();
        if (!response.ok) throw new Error(data.error || 'Stažení/extrakce selhala');

        showOverlay(false);
        
        // Show result preview
        const img = document.getElementById('generated-image');
        const video = document.getElementById('generated-video');
        
        img.src = data.tempImageUrl + '?t=' + Date.now();
        img.classList.remove('hidden');
        
        video.src = data.tempVideoUrl + '?t=' + Date.now();
        video.classList.remove('hidden');
        
        document.getElementById('preview-status-label').textContent = '[PŘIPRAVENO K POSOUZENÍ]';
        document.getElementById('btn-approve').disabled = false;
        document.getElementById('btn-discard').disabled = false;
        
        showToast('Nová varianta byla úspěšně vygenerována!', true);
      } catch (err) {
        showOverlay(false);
        showToast('Chyba při extrakci: ' + err.message, false);
      }
    }

    async function approveGeneration() {
      if (!currentPanel) return;
      
      try {
        const response = await fetch('/api/approve', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ filename: currentPanel.filename })
        });

        const data = await response.json();
        if (!response.ok) throw new Error(data.error || 'Failed to approve');

        showToast('Obrázek byl úspěšně nahrazen a původní zazálohován!', true);
        
        // Update list
        loadPanels();
        resetPreviewPane();
      } catch (err) {
        showToast('Chyba při schvalování: ' + err.message, false);
      }
    }

    async function discardGeneration() {
      if (!currentPanel) return;

      try {
        const response = await fetch('/api/discard', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ filename: currentPanel.filename })
        });

        const data = await response.json();
        if (!response.ok) throw new Error(data.error || 'Discard failed');

        resetPreviewPane();
        showToast('Generovaná verze byla zahozena.', false);
      } catch (err) {
        showToast('Chyba při zahazování: ' + err.message, false);
      }
    }

    function showOverlay(show, text = '', details = '') {
      const overlay = document.getElementById('status-overlay');
      if (show) {
        document.getElementById('status-text').textContent = text;
        document.getElementById('status-details').textContent = details;
        overlay.classList.add('active');
      } else {
        overlay.classList.remove('active');
      }
    }

    function updateOverlayDetails(details) {
      document.getElementById('status-details').textContent = details;
    }

    function showToast(message, isSuccess = true) {
      const toast = document.getElementById('toast-notification');
      toast.textContent = message;
      if (isSuccess) {
        toast.className = 'toast active success';
      } else {
        toast.className = 'toast active';
      }
      setTimeout(() => {
        toast.classList.remove('active');
      }, 4000);
    }

    // Init
    loadPanels();
  </script>
</body>
</html>
